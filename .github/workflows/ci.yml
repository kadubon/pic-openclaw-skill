name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --all-extras --dev --python ${{ matrix.python-version }}
      - run: uv run --python ${{ matrix.python-version }} ruff check .
      - run: uv run --python ${{ matrix.python-version }} ruff format --check .
      - run: uv run --python ${{ matrix.python-version }} mypy src scripts
      - run: uv run --python ${{ matrix.python-version }} pytest
      - run: uv build
